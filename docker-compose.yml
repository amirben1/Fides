version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10

  orchestrator:
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  governance:
    build:
      context: .
      dockerfile: services/governance/Dockerfile
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 10s
      timeout: 5s
      retries: 3

  dashboard:
    build: ./services/dashboard
    ports:
      - "3000:80"
    depends_on:
      - orchestrator
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  detection-agent:
    build:
      context: .
      dockerfile: services/detection_agent/Dockerfile
    env_file: .env
    environment:
      - INPUT_STREAM=norda:detection-agent:input
      - AGENT_ID=detection-agent-v1
    depends_on:
      redis:
        condition: service_healthy
      governance:
        condition: service_healthy

  compliance-agent:
    build:
      context: .
      dockerfile: services/compliance_agent/Dockerfile
    env_file: .env
    environment:
      - INPUT_STREAM=norda:compliance-agent:input
      - AGENT_ID=compliance-agent-v1
    depends_on:
      redis:
        condition: service_healthy
      governance:
        condition: service_healthy

volumes:
  pgdata:
